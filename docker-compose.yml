version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ms-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    container_name: ms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - appnet
    ports:
      - "9001:9001"

  backend:
    build: ./backend
    container_name: ms-backend
    depends_on:
      - postgres
      - minio
    networks:
      - appnet

  frontend:
    build: ./frontend
    container_name: ms-frontend
    depends_on:
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: ms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet: